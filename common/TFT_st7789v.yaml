# Turn on the TFT Backlight & Screen
output:
  - platform: gpio
    pin: 
      number: GPIO45
      ignore_strapping_warning: true
    id: tft_backlight
  - platform: gpio
    pin: GPIO21
    id: tft_power_out

switch:
  - platform: output
    name: "TFT Power"
    output: tft_power_out
    restore_mode: ALWAYS_ON
    internal: True

  - platform: output
    output: tft_backlight
    name: "Screen Backlight"
    restore_mode: ALWAYS_ON

spi:
  clk_pin: GPIO36
  mosi_pin: GPIO35
  miso_pin: GPIO37

color:
  - id: color_white
    hex: "FFFFFF"
  - id: color_black
    hex: "000000"
  - id: color_ph
    hex: "EB5531"
  - id: color_orp
    hex: "0D47A1"
  - id: color_ec
    hex: "1B5E20"
  - id: color_do
    hex: "B77900"
  - id: color_rtd
    hex: "607D8B"
  - id: color_co2
    hex: "FF9800"
  - id: color_hum
    hex: "00838F"
    
font:
  - file: "gfonts://Roboto"
    id: my_font
    size: 24
    bpp: 2
    glyphs: ' !"#$%&''()*+,-./0123456789:;<=>?@ABCDEFGHIJKLMNOPQRSTUVWXYZ[\]^_`abcdefghijklmnopqrstuvwxyz{|}~±µ'

display:
  - platform: mipi_spi
    id: tft_display
    model: ADAFRUIT-S2-TFT-FEATHER
    dc_pin: GPIO39
    reset_pin: GPIO40
    cs_pin: GPIO7
    dimensions:
      width: 135
      height: 240
      offset_width: 53
      offset_height: 40
    show_test_card: true
    rotation: 90
