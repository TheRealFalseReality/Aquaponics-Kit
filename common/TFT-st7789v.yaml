color:
  - id: color_white
    hex: "FFFFFF"
  - id: color_ph
    hex: "EB5531"
  - id: color_orp
    hex: "00BEF7"
  - id: color_rtd
    hex: "BDFBC6"
  - id: color_do
    hex: "FDD835"   # Nice visible yellow1
    
# Download a font to use for the screen
font:
  - file: "gfonts://Roboto"
    id: font_large
    size: 20

# Turn on the TFT Backlight
output:
  - platform: gpio
    pin: GPIO45
    id: tft_backlight

light:
  - platform: binary
    output: tft_backlight
    name: "Screen Backlight"
    restore_mode: ALWAYS_ON

# Formal power supply for the TFT
power_supply:
  - id: tft_power
    pin: GPIO21
    enable_time: 20ms
    keep_on_time: 10ms

# Set up the SPI bus for the display
spi:
  clk_pin: GPIO36
  mosi_pin: GPIO35

# Set up the ST7789 Display
display:
  - platform: st7789v
    id: tft_display
    model: "Custom"           
    height: 135               
    width: 240                
    offset_height: 40         
    offset_width: 52          
    cs_pin: GPIO7
    dc_pin: GPIO39
    reset_pin: GPIO40
    rotation: 270 
    update_interval: 1s
    power_supply: tft_power
    lambda: |-
      // --- Section 1: pH ---
      it.filled_rectangle(0, 0, 240, 33, id(color_ph));
      it.print(4, 22, id(font_large), id(color_white), TextAlign::BASELINE_LEFT, "pH");
      if (id(ph_ezo).has_state()) {
        it.printf(70, 22, id(font_large), id(color_white), TextAlign::BASELINE_LEFT, "%.2f", id(ph_ezo).state);
      } else {
        it.print(70, 22, id(font_large), id(color_white), TextAlign::BASELINE_LEFT, "no data");
      }

      // --- Section 2: ORP ---
      it.filled_rectangle(0, 33, 240, 33, id(color_orp));
      it.print(4, 57, id(font_large), id(color_white), TextAlign::BASELINE_LEFT, "ORP");
      if (id(orp_ezo).has_state()) {
        it.printf(70, 57, id(font_large), id(color_white), TextAlign::BASELINE_LEFT, "%.0f mV", id(orp_ezo).state);
      } else {
        it.print(70, 57, id(font_large), id(color_white), TextAlign::BASELINE_LEFT, "no data");
      }

      // --- Section 3: RTD ---
      it.filled_rectangle(0, 66, 240, 33, id(color_rtd));
      it.print(4, 90, id(font_large), id(color_white), TextAlign::BASELINE_LEFT, "RTD");
      if (id(rtd_ezo).has_state()) {
        it.printf(70, 90, id(font_large), id(color_white), TextAlign::BASELINE_LEFT, "%.1f C", id(rtd_ezo).state);
      } else {
        it.print(70, 90, id(font_large), id(color_white), TextAlign::BASELINE_LEFT, "no data");
      }
      
      // --- Section 4: DO ---
      // Fills the remaining 36 pixels at the bottom of the 135px screen
      it.filled_rectangle(0, 99, 240, 36, id(color_do));
      it.print(4, 124, id(font_large), id(color_white), TextAlign::BASELINE_LEFT, "DO");
      
      if (id(do_ezo).has_state()) {
        it.printf(70, 124, id(font_large), id(color_white), TextAlign::BASELINE_LEFT, "%.2f mg/L", id(do_ezo).state);
      } else {
        it.print(70, 124, id(font_large), id(color_white), TextAlign::BASELINE_LEFT, "no data");
      }